<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Antennae -->
  <g id="antennae">
    <line id="antenna-left" x1="180" y1="80" x2="170" y2="50" stroke="black" stroke-width="3" stroke-linecap="round"/>
    <circle id="antenna-left-tip" cx="170" cy="50" r="4" fill="black"/>
    <line id="antenna-right" x1="220" y1="80" x2="230" y2="50" stroke="black" stroke-width="3" stroke-linecap="round"/>
    <circle id="antenna-right-tip" cx="230" cy="50" r="4" fill="black"/>
  </g>
  
  <!-- Head - Fillable area -->
  <circle id="head" cx="200" cy="100" r="35" fill="white" stroke="black" stroke-width="3"/>
  
  <!-- Eyes -->
  <g id="eyes">
    <circle id="eye-left" cx="190" cy="95" r="8" fill="black"/>
    <circle id="eye-left-highlight" cx="192" cy="93" r="2" fill="white"/>
    <circle id="eye-right" cx="210" cy="95" r="8" fill="black"/>
    <circle id="eye-right-highlight" cx="212" cy="93" r="2" fill="white"/>
  </g>
  
  <!-- Mouth -->
  <path id="mouth" d="M 195 110 Q 200 115 205 110" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Body (segmented) - Fillable areas -->
  <g id="body">
    <ellipse id="body-segment-1" cx="200" cy="140" rx="12" ry="15" fill="white" stroke="black" stroke-width="3"/>
    <ellipse id="body-segment-2" cx="200" cy="160" rx="12" ry="15" fill="white" stroke="black" stroke-width="3"/>
    <ellipse id="body-segment-3" cx="200" cy="180" rx="12" ry="15" fill="white" stroke="black" stroke-width="3"/>
  </g>
  
  <!-- Upper Wings - Left - Fillable area -->
  <g id="upper-wings-left">
    <path id="upper-wing-left" d="M 165 120 Q 120 100 100 140 Q 100 180 140 200 Q 165 210 180 190 Q 185 160 165 120 Z" fill="white" stroke="black" stroke-width="3"/>
    <path id="upper-wing-left-inner" d="M 170 130 Q 140 115 125 145 Q 125 170 150 185 Q 170 192 175 175 Q 177 155 170 130" fill="none" stroke="black" stroke-width="2"/>
    <circle id="upper-wing-left-circle" cx="140" cy="155" r="8" fill="none" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Upper Wings - Right - Fillable area -->
  <g id="upper-wings-right">
    <path id="upper-wing-right" d="M 235 120 Q 280 100 300 140 Q 300 180 260 200 Q 235 210 220 190 Q 215 160 235 120 Z" fill="white" stroke="black" stroke-width="3"/>
    <path id="upper-wing-right-inner" d="M 230 130 Q 260 115 275 145 Q 275 170 250 185 Q 230 192 225 175 Q 223 155 230 130" fill="none" stroke="black" stroke-width="2"/>
    <circle id="upper-wing-right-circle" cx="260" cy="155" r="8" fill="none" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Lower Wings - Left - Fillable area -->
  <g id="lower-wings-left">
    <path id="lower-wing-left" d="M 180 190 Q 150 210 130 240 Q 130 270 160 280 Q 180 285 195 270 Q 200 250 180 190 Z" fill="white" stroke="black" stroke-width="3"/>
    <path id="lower-wing-left-inner" d="M 185 200 Q 165 215 150 240 Q 150 260 170 270 Q 185 273 192 260 Q 195 245 185 200" fill="none" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Lower Wings - Right - Fillable area -->
  <g id="lower-wings-right">
    <path id="lower-wing-right" d="M 220 190 Q 250 210 270 240 Q 270 270 240 280 Q 220 285 205 270 Q 200 250 220 190 Z" fill="white" stroke="black" stroke-width="3"/>
    <path id="lower-wing-right-inner" d="M 215 200 Q 235 215 250 240 Q 250 260 230 270 Q 215 273 208 260 Q 205 245 215 200" fill="none" stroke="black" stroke-width="2"/>
  </g>
</svg>