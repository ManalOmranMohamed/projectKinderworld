name: Backend CI

on:
  push:
    paths:
      - "kinderbackend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "kinderbackend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: kinderbackend
    env:
      SECRET_KEY: TEST_ONLY_SECRET
      KINDER_JWT_SECRET: TEST_ONLY_SECRET
      ENABLE_ADMIN_SEED_ENDPOINT: "true"
      ADMIN_SEED_SECRET: TEST_ONLY_SECRET
      ADMIN_SEED_PASSWORD: CHANGE_ME
      ADMIN_SEED_EMAIL: change-me@example.invalid
      ADMIN_SEED_NAME: DEV ONLY ADMIN
      SKIP_SCHEMA_VERIFY: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: kinderbackend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          for path in sorted(Path(".").rglob("*.py")):
              if ".venv" in path.parts or "__pycache__" in path.parts:
                  continue
              py_compile.compile(str(path), doraise=True)
          print("Python compile check passed.")
          PY

      - name: Import smoke test
        run: pytest test_imports.py -q

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-checks
    defaults:
      run:
        shell: bash
        working-directory: kinderbackend
    env:
      SECRET_KEY: TEST_ONLY_SECRET
      KINDER_JWT_SECRET: TEST_ONLY_SECRET
      ENABLE_ADMIN_SEED_ENDPOINT: "true"
      ADMIN_SEED_SECRET: TEST_ONLY_SECRET
      ADMIN_SEED_PASSWORD: CHANGE_ME
      ADMIN_SEED_EMAIL: change-me@example.invalid
      ADMIN_SEED_NAME: DEV ONLY ADMIN
      SKIP_SCHEMA_VERIFY: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: kinderbackend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest suite
        run: pytest -q
