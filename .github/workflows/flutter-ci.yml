name: Flutter CI

on:
  push:
    paths:
      - "kinder_world_child_mode/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    paths:
      - "kinder_world_child_mode/**"
      - ".github/workflows/flutter-ci.yml"
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: kinder_world_child_mode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: flutter-analyze
    defaults:
      run:
        shell: bash
        working-directory: kinder_world_child_mode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Enforce Flutter coverage policy
        run: |
          python ../tools/coverage_policy.py flutter \
            --coverage-file coverage/lcov.info \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload Flutter coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: kinder_world_child_mode/coverage/lcov.info
          if-no-files-found: error
