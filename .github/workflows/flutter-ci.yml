name: Flutter CI

on:
  push:
    paths:
      - "kinder_world_child_mode/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    paths:
      - "kinder_world_child_mode/**"
      - ".github/workflows/flutter-ci.yml"
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: kinder_world_child_mode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: dart analyze

  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: flutter-analyze
    defaults:
      run:
        shell: bash
        working-directory: kinder_world_child_mode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test
